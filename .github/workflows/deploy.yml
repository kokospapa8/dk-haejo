name: Deploy Bot to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/**"
      - "**.md"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. AWS 인증 ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 2. .env 동기화 ───────────────────────────────────────────────────────
      # base64로 인코딩 후 전달 → 특수문자/이스케이프 문제 완전 회피
      - name: Sync .env to EC2 via SSM
        run: |
          ENV_B64=$(printf '%s\n' \
            "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "CLAUDE_MODEL=${{ secrets.CLAUDE_MODEL || 'claude-opus-4-7' }}" \
            "MUSIC_CHANNEL_IDS=${{ secrets.MUSIC_CHANNEL_IDS }}" \
            | base64 -w0)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"mkdir -p /home/ubuntu/dk-haejo\",
              \"echo ${ENV_B64} | base64 -d > /home/ubuntu/dk-haejo/.env\",
              \"echo .env synced\"
            ]" \
            --comment "sync-env" \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 12); do
            S=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            [ "$S" = "Success" ] && { echo "✅ .env 동기화 완료"; break; }
            [ "$S" = "Failed"  ] && { echo "❌ .env 동기화 실패"; exit 1; }
            sleep 5
          done

      # ── 3. 코드 Pull + Docker 재빌드 ─────────────────────────────────────────
      # 스크립트를 base64로 인코딩 → SSM에 단일 문자열로 전달 → EC2에서 디코딩 실행
      - name: Deploy via SSM
        id: deploy
        run: |
          DEPLOY_SCRIPT_B64=$(base64 -w0 << 'BASH_EOF'
          #!/bin/bash
          set -e
          REPO=/home/ubuntu/dk-haejo

          # 디렉토리가 있지만 .git이 없으면 (이전 실패 잔재) 삭제
          if [ -d "$REPO" ] && [ ! -d "$REPO/.git" ]; then
            echo "잔여 디렉토리 정리: $REPO"
            rm -rf "$REPO"
          fi

          # 최초 클론
          if [ ! -d "$REPO/.git" ]; then
            git clone https://github.com/kokospapa8/dk-haejo.git "$REPO"
          fi

          cd "$REPO"
          git fetch origin main
          git reset --hard origin/main

          docker compose up -d --build --remove-orphans 2>&1
          docker image prune -f

          echo "✅ 배포 완료: $(date)"
          BASH_EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo ${DEPLOY_SCRIPT_B64} | base64 -d | bash\"]" \
            --comment "deploy-${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      # ── 4. 완료 대기 및 로그 출력 ────────────────────────────────────────────
      - name: Wait for deployment
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          echo "배포 완료 대기 중..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] 상태: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 배포 성공!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ 배포 실패! 에러 로그:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

          echo "❌ 타임아웃"
          exit 1

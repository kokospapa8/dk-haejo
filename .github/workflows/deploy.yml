name: Deploy Bot to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/**"       # 인프라 변경은 infra.yml이 담당
      - "**.md"

permissions:
  contents: read
  # id-token: write  ← OIDC 방식으로 전환 시 활성화

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. AWS 인증 (IAM 사용자 Access Key) ────────────────────────────────
      - name: Configure AWS credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 2. EC2에 .env 파일 최신화 (SSM) ────────────────────────────────────
      - name: Sync .env to EC2 via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"mkdir -p /home/ubuntu/dk-haejo\",
              \"printf 'DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}\nANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\nCLAUDE_MODEL=${{ secrets.CLAUDE_MODEL || 'claude-opus-4-7' }}\nMUSIC_CHANNEL_IDS=${{ secrets.MUSIC_CHANNEL_IDS }}\n' > /home/ubuntu/dk-haejo/.env\"
            ]" \
            --comment "sync .env" \
            --query "Command.CommandId" --output text)

          echo "env_cmd_id=$CMD_ID" >> $GITHUB_ENV

          # 완료 대기
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            [ "$STATUS" = "Success" ] && break
            [ "$STATUS" = "Failed"  ] && { echo "❌ .env 동기화 실패"; exit 1; }
            sleep 5
          done

      # ── 3. 코드 Pull + Docker 재빌드 (SSM) ─────────────────────────────────
      - name: Deploy via SSM
        id: deploy
        run: |
          REPO="/home/ubuntu/dk-haejo"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"set -e\",
              \"REPO=$REPO\",
              \"# 디렉토리가 있지만 git repo가 아니면 삭제 후 클론\",
              \"if [ -d \\\$REPO ] && [ ! -d \\\$REPO/.git ]; then rm -rf \\\$REPO; fi\",
              \"# 없으면 클론\",
              \"if [ ! -d \\\$REPO/.git ]; then git clone https://github.com/kokospapa8/dk-haejo.git \\\$REPO; fi\",
              \"cd \\\$REPO\",
              \"git fetch origin main\",
              \"git reset --hard origin/main\",
              \"docker compose up -d --build --remove-orphans 2>&1\",
              \"docker image prune -f\",
              \"echo '✅ 배포 완료'\"
            ]" \
            --comment "deploy ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      # ── 4. 배포 완료 대기 및 로그 출력 ──────────────────────────────────────
      - name: Wait for deployment
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          echo "SSM 명령 완료 대기 중..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] 상태: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 배포 성공!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ 배포 실패!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

          echo "❌ 타임아웃"
          exit 1

name: Deploy Bot to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/**"
      - "**.md"
  workflow_dispatch:    # GitHub Actions UI에서 수동 실행 가능

permissions:
  contents: write   # version bump 커밋 push 필요

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 코드 체크아웃 ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changelog 생성을 위해 전체 히스토리 필요

      # ── 2. 버전 자동 업 + ANNOUNCE.md 생성 ──────────────────────────────────
      - name: Bump version and generate changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          bash scripts/bump_version.sh
          NEW_VERSION=$(cat VERSION)

          # 이전 버전 bump 커밋 이후의 변경 내역 수집
          LAST_BUMP=$(git log --format="%H" --grep="\[skip ci\]" -1 2>/dev/null || echo "")
          if [ -n "$LAST_BUMP" ]; then
            RANGE="${LAST_BUMP}..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi

          CHANGELOG=$(git log --pretty="- %s" "$RANGE" \
            | grep -v "\[skip ci\]" \
            | grep -v "^- Merge" \
            | head -15)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- 새 버전 배포"
          fi

          printf "### 변경사항\n\n%s\n" "$CHANGELOG" > ANNOUNCE.md

          git add VERSION ANNOUNCE.md
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push

      # ── 3. AWS 인증 ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 4. .env 동기화 ───────────────────────────────────────────────────────
      - name: Sync .env to EC2 via SSM
        run: |
          ENV_B64=$(printf 'DISCORD_TOKEN=%s\nANTHROPIC_API_KEY=%s\nCLAUDE_MODEL=%s\nMUSIC_CHANNEL_IDS=%s\n' \
            '${{ secrets.DISCORD_TOKEN }}' \
            '${{ secrets.ANTHROPIC_API_KEY }}' \
            '${{ secrets.CLAUDE_MODEL || 'claude-sonnet-4-6' }}' \
            '${{ secrets.MUSIC_CHANNEL_IDS }}' \
            | base64 -w0)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"mkdir -p /home/ubuntu/dk-haejo\",\"echo ${ENV_B64} | base64 -d > /home/ubuntu/dk-haejo/.env\"]" \
            --comment "sync-env" \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 12); do
            S=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            [ "$S" = "Success" ] && { echo "✅ .env 동기화 완료"; break; }
            [ "$S" = "Failed"  ] && { echo "❌ .env 동기화 실패"; exit 1; }
            sleep 5
          done

      # ── 5. 배포 스크립트를 base64로 인코딩 후 SSM 실행 ──────────────────────
      - name: Deploy via SSM
        id: deploy
        run: |
          DEPLOY_B64=$(base64 -w0 scripts/deploy.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo ${DEPLOY_B64} | base64 -d | bash\"]" \
            --comment "deploy-${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      # ── 6. 완료 대기 및 로그 출력 ────────────────────────────────────────────
      - name: Wait for deployment
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          echo "배포 완료 대기 중..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] 상태: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 배포 성공!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ 배포 실패! 에러 로그:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

          echo "❌ 타임아웃"
          exit 1
